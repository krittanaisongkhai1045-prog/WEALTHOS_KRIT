<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WealthOS">
<meta name="theme-color" content="#06080f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>WealthOS</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg0:#06080f;--bg1:#0b0e1a;--bg2:#111422;--bg3:#181c2e;--bg4:#1f2438;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --text:#dde3f8;--muted:#515878;--muted2:#7c85aa;
  --g:#00dfa0;--b:#4b96ff;--y:#f0b730;--r:#ff4f6a;--p:#b87dff;--o:#ff8c42;--t:#00ccd4;
  --ga:rgba(0,223,160,.13);--ba:rgba(75,150,255,.13);--ya:rgba(240,183,48,.13);
  --ra:rgba(255,79,106,.13);--pa:rgba(184,125,255,.13);--oa:rgba(255,140,66,.13);
  --rad:14px;--rads:9px;--safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;font-size:14px}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg0);color:var(--text);
  min-height:100dvh;overflow-x:hidden;line-height:1.55;
  padding-bottom:calc(68px + var(--safe-b))}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 50% at 20% -10%,rgba(0,223,160,.04),transparent),
             radial-gradient(ellipse 60% 40% at 80% 110%,rgba(75,150,255,.04),transparent)}
#app{position:relative;z-index:1;max-width:430px;margin:0 auto}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:200;background:rgba(6,8,15,.9);
  backdrop-filter:blur(28px);border-bottom:1px solid var(--border);
  padding:calc(var(--safe-t) + 9px) 16px 9px;
  display:flex;align-items:center;justify-content:space-between;gap:10px}
.logo{font-weight:900;font-size:17px;letter-spacing:-.03em;flex-shrink:0;
  background:linear-gradient(120deg,var(--g),var(--b));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
#tt{font-weight:700;font-size:14px;flex:1;text-align:center}
#ta{flex-shrink:0}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;z-index:200;background:rgba(11,14,26,.97);
  backdrop-filter:blur(24px);border-top:1px solid var(--border);
  display:flex;padding-bottom:var(--safe-b)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:9px 0 8px;border:none;background:transparent;color:var(--muted);cursor:pointer;
  font-family:'Outfit',sans-serif;font-size:9.5px;font-weight:600;letter-spacing:.03em;
  text-transform:uppercase;transition:color .15s}
.nb .ic{font-size:19px;transition:transform .2s}
.nb.active{color:var(--g)}.nb.active .ic{transform:translateY(-2px)}

/* ── PAGES ── */
.page{display:none;padding:12px}
.page.active{display:block;animation:fu .18s ease}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── PRICE BAR ── */
.pricebar{display:flex;gap:7px;overflow-x:auto;padding:6px 12px;
  border-bottom:1px solid var(--border);background:var(--bg1);scrollbar-width:none}
.pricebar::-webkit-scrollbar{display:none}
.pchip{display:flex;flex-direction:column;align-items:center;background:var(--bg2);
  border:1px solid var(--border);border-radius:8px;padding:5px 10px;flex-shrink:0;min-width:66px}
.pchip .ps{font-size:9px;color:var(--muted2);font-weight:700}
.pchip .pp{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600}
.pchip .pc{font-size:9px;font-weight:600}
.pchip.up .pp,.pchip.up .pc{color:var(--g)}.pchip.dn .pp,.pchip.dn .pc{color:var(--r)}

/* ── STATUSBAR ── */
.sbar{display:flex;align-items:center;gap:6px;padding:5px 12px;
  font-size:10px;color:var(--muted2);border-bottom:1px solid var(--border);background:var(--bg1)}
.spin{display:inline-block;width:12px;height:12px;border:2px solid var(--bg4);
  border-top-color:var(--g);border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── KPI GRID ── */
.kg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px}
.kg.c3{grid-template-columns:1fr 1fr 1fr}.kg.c1{grid-template-columns:1fr}
.kpi{background:var(--bg1);border:1px solid var(--border);border-radius:var(--rad);
  padding:13px 14px;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;top:-20px;right:-20px;
  width:60px;height:60px;border-radius:50%;opacity:.18}
.kpi.g::after{background:var(--g)}.kpi.b::after{background:var(--b)}
.kpi.y::after{background:var(--y)}.kpi.r::after{background:var(--r)}
.kpi.p::after{background:var(--p)}.kpi.o::after{background:var(--o)}
.kl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-weight:600}
.kv{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;margin-top:2px;line-height:1.2}
.kv.g{color:var(--g)}.kv.b{color:var(--b)}.kv.y{color:var(--y)}.kv.r{color:var(--r)}
.kv.p{color:var(--p)}.kv.o{color:var(--o)}
.ks{font-size:10px;color:var(--muted);margin-top:2px}
.kico{font-size:16px;margin-bottom:4px}

/* ── CARD ── */
.card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--rad);margin-bottom:11px;overflow:hidden}
.ch{padding:10px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between}
.ct{font-weight:700;font-size:12px;display:flex;align-items:center;gap:5px}
.cb{padding:12px 14px}

/* ── TAG ── */
.tag{display:inline-block;padding:2px 7px;border-radius:5px;
  font-size:9.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.tg{background:var(--ga);color:var(--g);border:1px solid rgba(0,223,160,.2)}
.tb{background:var(--ba);color:var(--b);border:1px solid rgba(75,150,255,.2)}
.ty{background:var(--ya);color:var(--y);border:1px solid rgba(240,183,48,.2)}
.tr{background:var(--ra);color:var(--r);border:1px solid rgba(255,79,106,.2)}
.tp{background:var(--pa);color:var(--p);border:1px solid rgba(184,125,255,.2)}
.to{background:var(--oa);color:var(--o);border:1px solid rgba(255,140,66,.2)}
.tm{background:rgba(255,255,255,.05);color:var(--muted2);border:1px solid var(--border)}

/* ── BUTTONS ── */
.btn{padding:9px 18px;border-radius:var(--rads);border:none;cursor:pointer;
  font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  transition:all .15s;white-space:nowrap;line-height:1}
.btn-g{background:var(--g);color:#031209}
.btn-b{background:var(--b);color:#fff}
.btn-y{background:var(--y);color:#0a0700}
.btn-r{background:var(--r);color:#fff}
.btn-p{background:var(--p);color:#0a0316}
.btn-ghost{background:var(--bg3);color:var(--muted2);border:1px solid var(--border)}
.btn-sm{padding:6px 13px;font-size:12px}
.btn-xs{padding:4px 9px;font-size:11px;border-radius:6px}
.btn-full{width:100%}
.btico{padding:6px 8px;font-size:14px}

/* ── FORMS ── */
.fg{margin-bottom:11px}
.fl{display:block;font-size:10px;color:var(--muted2);text-transform:uppercase;
  letter-spacing:.08em;font-weight:600;margin-bottom:5px}
.fi,.fs{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border2);
  border-radius:var(--rads);color:var(--text);font-family:'Outfit',sans-serif;
  font-size:14px;outline:none;transition:border-color .15s;-webkit-appearance:none}
.fi:focus,.fs:focus{border-color:var(--g)}
.fs option{background:var(--bg2)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fhint{font-size:10px;color:var(--muted);margin-top:3px}
.fhint.ok{color:var(--g)}

/* ── MODAL ── */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.83);
  backdrop-filter:blur(10px);z-index:500;align-items:flex-end;justify-content:center}
.mov.open{display:flex}
.modal{background:var(--bg1);border:1px solid var(--border2);
  border-radius:20px 20px 0 0;width:100%;max-width:430px;
  max-height:93dvh;overflow-y:auto;padding-bottom:calc(14px + var(--safe-b));
  animation:mu .22s cubic-bezier(.32,.72,0,1)}
@keyframes mu{from{transform:translateY(40px);opacity:.4}to{transform:translateY(0);opacity:1}}
.mh2{width:38px;height:4px;background:var(--bg4);border-radius:4px;margin:11px auto 0}
.mhead{padding:13px 18px 0;display:flex;align-items:center;justify-content:space-between}
.mtitle{font-weight:800;font-size:15px}
.mbody{padding:13px 18px}
.mfoot{padding:0 18px;display:flex;gap:9px}

/* ── ASSET CARD ── */
.asset{background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--rads);padding:11px 13px;margin-bottom:8px}
.asy{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px}
.aname{font-size:10px;color:var(--muted2);margin-top:1px}
.arow{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.acell{flex:1;min-width:60px}
.acl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.acv{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;margin-top:1px}
.div{height:1px;background:var(--border);margin:8px 0}
.pos{color:var(--g)}.neg{color:var(--r)}
.mono{font-family:'JetBrains Mono',monospace}
.pbar-w{background:var(--bg4);border-radius:4px;height:5px;overflow:hidden;margin:3px 0}
.pbar{height:100%;border-radius:4px;transition:width .5s ease}

/* ── FOREX BOT CARD ── */
.fport{background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--rads);padding:13px 15px;margin-bottom:9px}
.fport-name{font-weight:700;font-size:14px;margin-bottom:3px}
.fport-bal{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--b)}
.with-row{padding:9px 14px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center}

/* ── REBALANCE RESULT ITEM ── */
.reb{background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--rads);padding:10px 13px;margin-bottom:7px}

/* ── TOAST ── */
#toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%) translateY(30px);
  background:var(--bg2);border:1px solid var(--border2);border-radius:26px;
  padding:8px 18px;font-size:13px;z-index:9999;transition:all .22s;
  pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.6);white-space:nowrap;opacity:0}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ── CHART ── */
.cwrap{position:relative;height:180px}
</style>
</head>
<body>
<div id="app">

<div class="topbar">
  <div class="logo">⬡ WealthOS</div>
  <div id="tt"></div>
  <div id="ta"></div>
</div>

<div class="sbar">
  <div class="spin" id="pspin" style="display:none"></div>
  <span id="stxt">กำลังดึงราคาสด...</span>
</div>
<div class="pricebar" id="pbar2"></div>

<div class="page active" id="pg-dash"></div>
<div class="page" id="pg-invest"></div>
<div class="page" id="pg-rebal"></div>
<div class="page" id="pg-reserve"></div>
<div class="page" id="pg-forex"></div>

<nav class="bnav">
  <button class="nb active" data-p="dash"    onclick="go('dash')"><span class="ic">📊</span>Overview</button>
  <button class="nb"         data-p="invest"  onclick="go('invest')"><span class="ic">📈</span>ลงทุน</button>
  <button class="nb"         data-p="rebal"   onclick="go('rebal')"><span class="ic">⚖️</span>Rebalance</button>
  <button class="nb"         data-p="reserve" onclick="go('reserve')"><span class="ic">🏦</span>สำรอง</button>
  <button class="nb"         data-p="forex"   onclick="go('forex')"><span class="ic">🤖</span>FX Bot</button>
</nav>
</div>

<!-- ══ MODALS ══════════════════════════════════════════════════════ -->

<!-- INVEST -->
<div class="mov" id="m-inv">
<div class="modal">
  <div class="mh2"></div>
  <div class="mhead">
    <div class="mtitle" id="mi-t">➕ เพิ่มสินทรัพย์</div>
    <button class="btn btn-ghost btn-xs" onclick="cm('m-inv')">✕</button>
  </div>
  <div class="mbody">
    <div class="fg">
      <label class="fl">Symbol</label>
      <input class="fi" id="mi-sym" placeholder="เช่น NVDA, IVV, GOLD..." list="sdl" autocomplete="off" oninput="onSym(this.value)">
      <datalist id="sdl"></datalist>
      <div class="fhint ok" id="mi-sh"></div>
    </div>
    <div class="fg">
      <label class="fl">ชื่อเต็ม</label>
      <input class="fi" id="mi-name" placeholder="ชื่อสินทรัพย์">
    </div>
    <div class="fr">
      <div class="fg">
        <label class="fl">Sector</label>
        <select class="fs" id="mi-cat">
          <option value="BASE">🏛️ ฐาน</option>
          <option value="BRAIN">🧠 Software/AI</option>
          <option value="SEMI">🔬 Semiconductor</option>
          <option value="CYBER">🔐 Cybersecurity</option>
          <option value="ENERGY">⚡ Energy</option>
          <option value="MATERIAL">🪨 วัตถุดิบ</option>
          <option value="OTHER">📦 อื่นๆ</option>
        </select>
      </div>
      <div class="fg">
        <label class="fl">วันที่ซื้อ</label>
        <input class="fi" type="date" id="mi-date">
      </div>
    </div>
    <div class="fr">
      <div class="fg">
        <label class="fl">จำนวนหุ้น/หน่วย</label>
        <input class="fi" type="number" id="mi-qty" placeholder="0" step="any" oninput="calcTotal()">
      </div>
      <div class="fg">
        <label class="fl">ราคาซื้อ (USD)</label>
        <input class="fi" type="number" id="mi-buy" placeholder="0.00" step="any" oninput="calcTotal()">
      </div>
    </div>
    <div class="fg">
      <label class="fl">เงินที่ลงทุน (฿) — คำนวณให้อัตโนมัติ</label>
      <input class="fi" type="number" id="mi-total" placeholder="0.00" step="any">
      <div class="fhint" id="mi-th"></div>
    </div>
    <!-- PRICE MODE TOGGLE -->
    <div class="fg">
      <label class="fl">โหมดราคาปัจจุบัน</label>
      <div style="display:flex;gap:7px">
        <button id="pm-auto-btn" class="btn btn-b btn-sm" onclick="setPriceMode('auto')">📡 ดึงอัตโนมัติ</button>
        <button id="pm-manual-btn" class="btn btn-ghost btn-sm" onclick="setPriceMode('manual')">📝 กรอกรายเดือน</button>
      </div>
    </div>
    <!-- AUTO MODE -->
    <div id="pm-auto-sec" class="fg">
      <label class="fl">ราคาปัจจุบัน (USD)</label>
      <div style="display:flex;gap:7px;align-items:stretch">
        <input class="fi" type="number" id="mi-cur" placeholder="0.00" step="any" style="flex:1">
        <button class="btn btn-b btn-sm" id="mi-fetch-btn" onclick="fetchSinglePrice()" style="flex-shrink:0;white-space:nowrap">📡 ดึงราคา</button>
      </div>
      <div class="fhint ok" id="mi-ch"></div>
    </div>
    <!-- MANUAL MONTHLY MODE -->
    <div id="pm-manual-sec" style="display:none;margin-bottom:11px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <label class="fl" style="margin:0">ราคารายเดือน (USD)</label>
        <button class="btn btn-ghost btn-xs" onclick="addPriceRow()">+ เพิ่มเดือน</button>
      </div>
      <div id="mi-ph-list" style="max-height:200px;overflow-y:auto"></div>
      <div class="fhint" id="mi-ph-hint" style="margin-top:5px">💡 ราคาของเดือนล่าสุดจะใช้เป็นราคาปัจจุบัน</div>
    </div>
    <div class="fg">
      <label class="fl">% เป้าหมายในพอร์ต</label>
      <input class="fi" type="number" id="mi-tgt" placeholder="เช่น 30" step="0.5" min="0" max="100">
    </div>
  </div>
  <div class="mfoot">
    <button class="btn btn-b btn-full" onclick="saveInv()">💾 บันทึก</button>
    <button class="btn btn-ghost" onclick="cm('m-inv')">ยกเลิก</button>
  </div>
</div>
</div>

<!-- UPDATE PRICE -->
<div class="mov" id="m-px">
<div class="modal" style="border-radius:18px">
  <div class="mh2"></div>
  <div class="mhead">
    <div class="mtitle" id="mp-t">💹 อัปเดตราคา</div>
    <button class="btn btn-ghost btn-xs" onclick="cm('m-px')">✕</button>
  </div>
  <div class="mbody">
    <div class="fg">
      <label class="fl">ราคาปัจจุบัน (USD)</label>
      <input class="fi" type="number" id="mp-px" placeholder="0.00" step="any">
    </div>
  </div>
  <div class="mfoot" style="padding-bottom:12px">
    <button class="btn btn-g btn-full" onclick="savePx()">อัปเดต</button>
    <button class="btn btn-ghost" onclick="cm('m-px')">ยกเลิก</button>
  </div>
</div>
</div>

<!-- RESERVE -->
<div class="mov" id="m-res">
<div class="modal">
  <div class="mh2"></div>
  <div class="mhead">
    <div class="mtitle" id="mr-t">➕ บันทึกธุรกรรม</div>
    <button class="btn btn-ghost btn-xs" onclick="cm('m-res')">✕</button>
  </div>
  <div class="mbody">
    <div class="fr">
      <div class="fg">
        <label class="fl">วันที่</label>
        <input class="fi" type="date" id="rr-d">
      </div>
      <div class="fg">
        <label class="fl">ประเภท</label>
        <select class="fs" id="rr-t">
          <option value="income">💚 รายรับ</option>
          <option value="expense">🔴 รายจ่าย</option>
        </select>
      </div>
    </div>
    <div class="fg">
      <label class="fl">หมวดหมู่</label>
      <select class="fs" id="rr-c">
        <option>เงินเดือน</option><option>โบนัส</option><option>รายได้ลงทุน</option>
        <option>รายได้อื่น</option><option>อาหาร</option><option>เดินทาง</option>
        <option>ที่พัก</option><option>ช็อปปิ้ง</option><option>สุขภาพ</option>
        <option>โอนลงทุน</option><option>อื่นๆ</option>
      </select>
    </div>
    <div class="fg">
      <label class="fl">รายละเอียด</label>
      <input class="fi" id="rr-desc" placeholder="บรรยายสั้นๆ">
    </div>
    <div class="fg">
      <label class="fl">จำนวนเงิน (฿)</label>
      <input class="fi" type="number" id="rr-a" placeholder="0.00" step="0.01" min="0">
    </div>
  </div>
  <div class="mfoot">
    <button class="btn btn-g btn-full" onclick="saveRes()">💾 บันทึก</button>
    <button class="btn btn-ghost" onclick="cm('m-res')">ยกเลิก</button>
  </div>
</div>
</div>

<!-- FOREX PORT -->
<div class="mov" id="m-fp">
<div class="modal">
  <div class="mh2"></div>
  <div class="mhead">
    <div class="mtitle" id="mfp-t">➕ เพิ่ม Bot Portfolio</div>
    <button class="btn btn-ghost btn-xs" onclick="cm('m-fp')">✕</button>
  </div>
  <div class="mbody">
    <div class="fg">

  try{
    const res=await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,{signal:AbortSignal.timeout(10000)});

    (json?.quoteResponse?.result||[]).forEach(q=>{

/* ══ CALC ════════════════════════════════════════════════════════════ */
function calcInv(){
  const fx=DB.usdthb||35;
  let curVal=0,cost=0;
  DB.investments.forEach(i=>{
    curVal+=(i.qty*(i.curPrice||i.buyPrice))*fx;
    cost+=(i.totalBaht||(i.qty*i.buyPrice*fx));
  });
  return{curVal,cost,pnl:curVal-cost,pnlP:cost>0?((curVal-cost)/cost)*100:0,count:DB.investments.length};
}
function calcRes(){
  const inc=DB.reserve.filter(x=>x.type==='income').reduce((s,x)=>s+x.amount,0);
  const exp=DB.reserve.filter(x=>x.type==='expense').reduce((s,x)=>s+x.amount,0);
  return{bal:inc-exp,inc,exp};
}
function calcFx(){
  const totalBal=DB.fxPorts.reduce((s,p)=>s+p.balance,0);
  const totalWith=DB.fxWithdrawals.reduce((s,w)=>s+w.amount,0);
  return{totalBal,totalWith,ports:DB.fxPorts.length};
}

/* ══ GROWTH CHART DATA ═══════════════════════════════════════════════
   สร้างข้อมูลรายเดือนย้อนหลัง 12 เดือน จากข้อมูลจริงในระบบ
   - พอร์ตลงทุน: สะสม totalBaht ของแต่ละ investment ตาม date
   - เงินสำรอง: สะสม reserve transactions รายเดือน
   - FX Bot: สะสม withdrawals รายเดือน
════════════════════════════════════════════════════════════════════ */
function buildGrowthData(){
  // สร้าง 12 เดือนย้อนหลัง
  const months = [];
  const now = new Date();
  for(let i=11; i>=0; i--){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    months.push(d.toISOString().slice(0,7)); // "YYYY-MM"
  }

  // ── พอร์ตลงทุน: ใช้มูลค่าปัจจุบัน + สะสมจากวันที่ซื้อ ──
  // แต่ละเดือน = มูลค่าของสินทรัพย์ที่ซื้อไปแล้ว ณ เดือนนั้น (ใช้ราคาปัจจุบันเป็น proxy)
  const invByMonth = months.map(m => {
    const bought = DB.investments.filter(i => i.date && i.date.slice(0,7) <= m);
    return bought.reduce((s,i) => s + (i.totalBaht||(i.qty*i.buyPrice*(DB.usdthb||35))), 0);
  });

  // ── เงินสำรอง: สะสมยอดคงเหลือถึงแต่ละเดือน ──
  const resByMonth = months.map(m => {
    return DB.reserve
      .filter(t => t.date && t.date.slice(0,7) <= m)
      .reduce((s,t) => s+t.amount, 0);
  });

  // ── FX Bot: สะสมการถอนกำไรถึงแต่ละเดือน ──
  const fxByMonth = months.map(m => {
    return DB.fxWithdrawals
      .filter(w => w.date && w.date.slice(0,7) <= m)
      .reduce((s,w) => s+w.amount, 0);
  });

  // labels แสดงเป็นเดือนภาษาไทย
  const labels = months.map(m => {
    const [y,mo] = m.split('-');
    const thMonth = ['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    return `${thMonth[parseInt(mo)]}${(parseInt(y)+543).toString().slice(2)}`;
  });

  return { labels, invByMonth, resByMonth, fxByMonth };
}

/* ══ GROWTH CHART RENDER ═════════════════════════════════════════════ */
function renderGrowthChart(range){
  const el = document.getElementById('d-growth');
  if(!el) return;
  const gd = buildGrowthData();
  const n = range || 12;
  const labels = gd.labels.slice(-n);
  const inv    = gd.invByMonth.slice(-n);
  const res    = gd.resByMonth.slice(-n);
  const fx     = gd.fxByMonth.slice(-n);

  // range button highlight
  ['6','12'].forEach(r => {
    const b = document.getElementById('rng-'+r);
    if(b) b.style.color = String(n)===r ? 'var(--g)' : '';
  });

  if(growthChart) growthChart.destroy();
  const ctx = el.getContext('2d');

  // gradient fills
  const gG = ctx.createLinearGradient(0,0,0,200);
  gG.addColorStop(0,'rgba(75,150,255,0.35)'); gG.addColorStop(1,'rgba(75,150,255,0)');
  const gR = ctx.createLinearGradient(0,0,0,200);
  gR.addColorStop(0,'rgba(0,223,160,0.35)'); gR.addColorStop(1,'rgba(0,223,160,0)');
  const gFx = ctx.createLinearGradient(0,0,0,200);
  gFx.addColorStop(0,'rgba(240,183,48,0.35)'); gFx.addColorStop(1,'rgba(240,183,48,0)');

  const hasAnyData = [...inv,...res,...fx].some(v=>v>0);

  growthChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'พอร์ตลงทุน',
          data: inv,
          borderColor: '#4b96ff', backgroundColor: gG,
          borderWidth: 2, fill: true, tension: 0.4,
          pointRadius: 3, pointBackgroundColor: '#4b96ff',
          pointHoverRadius: 5,
        },
        {
          label: 'เงินสำรอง',
          data: res,
          borderColor: '#00dfa0', backgroundColor: gR,
          borderWidth: 2, fill: true, tension: 0.4,
          pointRadius: 3, pointBackgroundColor: '#00dfa0',
          pointHoverRadius: 5,
        },
        {
          label: 'FX ถอนสะสม',
          data: fx,
          borderColor: '#f0b730', backgroundColor: gFx,
          borderWidth: 2, fill: true, tension: 0.4,
          pointRadius: 3, pointBackgroundColor: '#f0b730',
          pointHoverRadius: 5,
        },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(17,20,34,0.95)',
          borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1,
          titleColor: '#dde3f8', bodyColor: '#7c85aa',
          padding: 10, cornerRadius: 8,
          callbacks: { label: c => ` ${c.dataset.label}: ${fB(c.raw)}` }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: { color: '#515878', font: { size: 10 }, maxRotation: 0 }
        },
        y: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: {
            color: '#515878', font: { size: 10 },
            callback: v => v >= 1000000 ? `${fN(v/1000000,1)}M` : v >= 1000 ? `${fN(v/1000,0)}k` : fN(v,0)
          }
        }
      }
    }
  });

  // legend
  const legItems = [
    {label:'พอร์ตลงทุน', color:'#4b96ff'},
    {label:'เงินสำรอง',   color:'#00dfa0'},
    {label:'FX ถอนสะสม', color:'#f0b730'},
  ];
  const legEl = document.getElementById('d-growth-leg');
  if(legEl){
    legEl.innerHTML = legItems.map(l=>`
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted2)">
        <span style="width:20px;height:3px;background:${l.color};border-radius:2px;display:inline-block"></span>
        ${l.label}
      </div>`).join('');
  }

  if(!hasAnyData){
    ctx.save();
    ctx.fillStyle = '#515878';
    ctx.font = '12px Outfit, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('เพิ่มข้อมูลการลงทุน เงินสำรอง หรือการถอน FOREX เพื่อดูกราฟ', el.width/2, 90);
    ctx.restore();
  }
}

function setRange(n){
  DB._chartRange = n;
  renderGrowthChart(n);
}

function previewRebal(){
  const port=parseFloat(document.getElementById('rb-port').value)||0;
  const add=parseFloat(document.getElementById('rb-add').value)||0;
  const prev=document.getElementById('rb-preview');
  if(add>0){
    prev.style.display='block';
    document.getElementById('rb-new-total').textContent=fB(port+add);
  } else {
    prev.style.display='none';
  }
}

function runRebal(){
  const portVal=parseFloat(document.getElementById('rb-port').value)||0;
  const addMoney=parseFloat(document.getElementById('rb-add').value)||0;
  const newTotal=portVal+addMoney;
  const fx=DB.usdthb||35;

  if(addMoney<=0){toast('กรุณากรอกเงินที่จะเพิ่ม',false);return;}

  // For each asset: realVal = current market value in THB
  // targetVal = newTotal × (target%)
  // toBuy = targetVal - realVal
  // Sum of all toBuy = addMoney (if targets sum to 100%)
  const rows=DB.investments
    .filter(i=>(i.tgt||0)>0)
    .map(i=>{
      const realVal=i.qty*(i.curPrice||i.buyPrice)*fx;
      const targetVal=newTotal*(i.tgt/100);
      const toBuy=targetVal-realVal;                // positive=buy more, negative=overweight
      const sharesNeeded=toBuy>0?toBuy/((i.curPrice||i.buyPrice)*fx):0;
      return{...i,realVal,targetVal,toBuy,sharesNeeded};
    })
    .sort((a,b)=>b.toBuy-a.toBuy);

  const tgtSum=DB.investments.reduce((s,i)=>s+(i.tgt||0),0);
  const sumToBuy=rows.reduce((s,r)=>s+(r.toBuy>0?r.toBuy:0),0);

  document.getElementById('reb-out').innerHTML=`
  <div class="card" style="border-color:rgba(0,223,160,.15)">
    <div class="ch">
      <span class="ct" style="color:var(--g)">📊 ผลการคำนวณ</span>
      <span class="tag ${Math.abs(tgtSum-100)<0.1?'tg':'tr'}">${fN(tgtSum,1)}% target</span>
    </div>
    <div style="padding:8px 14px;background:rgba(75,150,255,.06);border-bottom:1px solid var(--border);font-size:11px;color:var(--muted2)">
      พอร์ตก่อนเพิ่ม <b style="color:var(--b)">${fB(portVal)}</b>
      + เงินที่เพิ่ม <b style="color:var(--g)">${fB(addMoney)}</b>
      = <b style="color:var(--y)">${fB(newTotal)}</b>
      · อัตรา ${fN(fx,2)} ฿/$
    </div>
    ${Math.abs(tgtSum-100)>0.5?`<div style="background:rgba(255,79,106,.1);border-bottom:1px solid var(--border);padding:8px 14px;font-size:11px;color:var(--r)">⚠️ % เป้ารวมกัน ${fN(tgtSum,1)}% — ควรรวมเป็น 100% เพื่อความแม่นยำ</div>`:''}
    <div style="padding:8px 10px">
      ${rows.map(r=>{
        const isBuy=r.toBuy>50;
        const isOver=r.toBuy<-50;
        const col=isBuy?'var(--g)':isOver?'var(--r)':'var(--muted)';
        return`<div class="reb" style="border-left:3px solid ${col}">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <span class="mono" style="color:${SEC[r.cat]?.color||'#888'};font-weight:700">${r.sym}</span>
              <span style="font-size:10px;color:var(--muted);margin-left:5px">${r.name?.slice(0,16)||''}</span>
            </div>
            <span class="tag ${isBuy?'tg':isOver?'tr':'tm'}">${fN(r.tgt)}% เป้า</span>
          </div>

          <!-- สิ่งที่ต้องทำ -->
          <div style="margin-top:6px;font-size:13px;font-weight:700;color:${col}">
            ${isBuy?`🟢 ซื้อเพิ่ม ${fB(r.toBuy)}`:isOver?`🔴 มากกว่าเป้า ${fB(Math.abs(r.toBuy))} (ถือไว้)`:
              `⚪ ถือไว้ (ห่างเป้าน้อยมาก)`}
          </div>

          ${isBuy?`<div style="font-size:10px;color:var(--muted2);margin-top:3px">≈ ${fN(r.sharesNeeded,r.sharesNeeded<0.01?6:3)} หน่วย × ${fU(r.curPrice||r.buyPrice)}</div>`:''}

          <!-- ตารางเปรียบเทียบ -->
          <div style="display:flex;gap:10px;font-size:10px;color:var(--muted);margin-top:6px;flex-wrap:wrap">
            <span>มีอยู่จริง <b style="color:var(--text)">${fB(r.realVal)}</b></span>
            <span>เป้าหมาย <b style="color:var(--b)">${fB(r.targetVal)}</b></span>
            <span>ส่วนต่าง <b style="color:${col}">${r.toBuy>=0?'+':''}${fB(r.toBuy)}</b></span>
          </div>
        </div>`;
      }).join('')}
      <div style="margin-top:10px;padding:10px 12px;background:var(--bg3);border-radius:8px;font-size:11px">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="color:var(--muted2)">รวมที่ต้องซื้อ (เฉพาะ +)</span>
          <span class="mono pos">${fB(sumToBuy)}</span>
        </div>
        <div style="display:flex;justify-content:space-between">
          <span style="color:var(--muted2)">เงินที่จะเพิ่ม</span>
          <span class="mono" style="color:var(--y)">${fB(addMoney)}</span>
        </div>

function om(id,mode,eid=null){
  editId=eid;
  const findRec=()=>DB.investments.find(x=>x.id===eid)||DB.fxPorts.find(x=>x.id===eid)||null;
  const d=eid?findRec():null;

  if(id==='m-inv'){
    document.getElementById('mi-t').textContent=mode==='new'?'➕ เพิ่มสินทรัพย์':'✏️ แก้ไขสินทรัพย์';
    const bp=d?.sym?KNOWN[d.sym]:null;
    document.getElementById('mi-sym').value=d?.sym||'';
    document.getElementById('mi-name').value=d?.name||bp?.name||'';
    document.getElementById('mi-cat').value=d?.cat||bp?.cat||'BASE';
    document.getElementById('mi-date').value=d?.date||today();
    document.getElementById('mi-qty').value=d?.qty||'';
    document.getElementById('mi-buy').value=d?.buyPrice||'';
    document.getElementById('mi-total').value=d?.totalBaht||'';
    document.getElementById('mi-tgt').value=d?.tgt||bp?.tgt||0;
    document.getElementById('mi-sh').textContent='';
    document.getElementById('mi-ch').textContent='';
    // คืนค่า price mode (new = auto default, edit = restore)
    _priceMode=d?.priceMode||'auto';
    _priceHistory=d?.priceHistory?JSON.parse(JSON.stringify(d.priceHistory)):[];
    // ถ้า new: เพิ่มเดือนปัจจุบันไว้ล่วงหน้าเผื่อเลือก manual
    if(mode==='new') _priceHistory=[];
    setPriceMode(_priceMode);
    document.getElementById('mi-cur').value=d?.curPrice||'';
    renderPriceHistory();
    if(d?.sym){
      document.getElementById('mi-ch').textContent=d.sym&&LIVE[d.sym]?`📡 ราคาสด: ${fU(LIVE[d.sym].price)} (${fP(LIVE[d.sym].chg)})`: '';
      onSym(d.sym);
    }
  }
  if(id==='m-res'){
    document.getElementById('mr-t').textContent=mode==='new'?'➕ บันทึกธุรกรรม':'✏️ แก้ไขธุรกรรม';
    const rd=eid?DB.reserve.find(x=>x.id===eid):null;
    document.getElementById('rr-d').value=rd?.date||today();
    document.getElementById('rr-t').value=rd?.type||'income';
    document.getElementById('rr-c').value=rd?.cat||'เงินเดือน';
    document.getElementById('rr-desc').value=rd?.desc||'';
    document.getElementById('rr-a').value=rd?Math.abs(rd.amount):'';
  }
  if(id==='m-fp'){
    document.getElementById('mfp-t').textContent=mode==='new'?'➕ เพิ่ม Bot Portfolio':'✏️ แก้ไขพอร์ต';
    document.getElementById('fp-name').value=d?.name||'';
    document.getElementById('fp-bal').value=d?.balance||'';
    document.getElementById('fp-note').value=d?.note||'';
  }
  document.getElementById(id).classList.add('open');
}

function saveInv(){
  const sym=document.getElementById('mi-sym').value.toUpperCase().trim();
  const name=document.getElementById('mi-name').value.trim();
  const qty=parseFloat(document.getElementById('mi-qty').value);
  const buyP=parseFloat(document.getElementById('mi-buy').value);
  const totalBaht=parseFloat(document.getElementById('mi-total').value)||(qty*buyP*DB.usdthb);
  const cat=document.getElementById('mi-cat').value;
  const date=document.getElementById('mi-date').value;
  const tgt=parseFloat(document.getElementById('mi-tgt').value)||0;
  if(!sym||!name||isNaN(qty)||isNaN(buyP)){toast('กรุณากรอกข้อมูลให้ครบ',false);return;}

  let curPrice=buyP;
  let priceHistory=[];
  if(_priceMode==='auto'){
    curPrice=parseFloat(document.getElementById('mi-cur').value)||buyP;
  }else{
    priceHistory=_priceHistory.filter(r=>r.price>0);
    if(!priceHistory.length){toast('กรุณาเพิ่มราคาอย่างน้อย 1 เดือน',false);return;}
    const latest=[...priceHistory].sort((a,b)=>b.month.localeCompare(a.month))[0];
    curPrice=latest.price;
  }

  const rec={id:editId||uid(),sym,name,cat,date,qty,buyPrice:buyP,totalBaht,curPrice,tgt,
             priceMode:_priceMode,priceHistory};
  if(editId) DB.investments=DB.investments.map(x=>x.id===editId?rec:x);
  else DB.investments.push(rec);
  saveDB();cm('m-inv');toast('บันทึกสำเร็จ');rInvest();rDash();
}

function saveRes(){
  const date=document.getElementById('rr-d').value;
  const type=document.getElementById('rr-t').value;
  const cat=document.getElementById('rr-c').value;
  const desc=document.getElementById('rr-desc').value.trim();

function saveFp(){

  const note=document.getElementById('fp-note').value.trim();

function saveFw(){
  const portId=document.getElementById('fw-pid').value;
  const date=document.getElementById('fw-d').value;
  const amount=parseFloat(document.getElementById('fw-a').value);
  const note=document.getElementById('fw-note').value.trim();
  const dest=document.querySelector('input[name="fw-dest"]:checked')?.value||'none';
  const cat=document.getElementById('fw-cat')?.value||'กำไร FOREX';
  if(!portId||!date||isNaN(amount)||amount<=0){toast('กรุณากรอกข้อมูลให้ครบ',false);return;}
  const port=DB.fxPorts.find(p=>p.id===portId);

  // บันทึกการถอน
  DB.fxWithdrawals.push({id:uid(),portId,date,amount,note,dest});

  // โยกไปเงินสำรอง → เพิ่มรายรับอัตโนมัติ
  if(dest==='reserve'){
    DB.reserve.push({id:uid(),date,type:'income',cat:'รายได้ลงทุน',
      desc:`กำไร FX${port?' ('+port.name+')':''}${note?' — '+note:''}`,amount});
    toast(`บันทึกแล้ว ✅ เพิ่ม ${fB(amount)} ในเงินสำรอง`);
  }
  // ค่าใช้จ่าย → เพิ่มรายจ่ายอัตโนมัติ
  else if(dest==='expense'){
    DB.reserve.push({id:uid(),date,type:'expense',cat,
      desc:`ใช้จ่ายจากกำไร FX${port?' ('+port.name+')':''}${note?' — '+note:''}`,amount:-amount});
    toast(`บันทึกแล้ว ✅ เพิ่มรายจ่าย ${fB(amount)} ในเงินสำรอง`);
  }
  else { toast('บันทึกการถอนสำเร็จ'); }

  saveDB();cm('m-fw');rFx();rDash();
}

/* ══ INVEST FORM HELPERS ═════════════════════════════════════════════ */
let _symFetchTimer=null;
async function onSym(v){
  const sym=v.toUpperCase().trim();
  const bp=KNOWN[sym];
  const sh=document.getElementById('mi-sh');
  const ch=document.getElementById('mi-ch');
  if(bp){
    document.getElementById('mi-name').value=bp.name;
    document.getElementById('mi-cat').value=bp.cat;
    if(!document.getElementById('mi-tgt').value&&bp.tgt) document.getElementById('mi-tgt').value=bp.tgt;
    sh.textContent=`✓ ${bp.name}`;sh.className='fhint ok';
  }else{sh.textContent=sym?'📝 สินทรัพย์ใหม่':'';sh.className='fhint';}
  // ถ้าโหมด auto: ดึงราคาอัตโนมัติ
  if(_priceMode==='auto'){
    if(LIVE[sym]?.price){
      document.getElementById('mi-cur').value=LIVE[sym].price;
      ch.textContent=`📡 ราคาสด: ${fU(LIVE[sym].price)} (${fP(LIVE[sym].chg)})`;
      ch.className='fhint ok';
    }else if(sym.length>=2){
      ch.textContent='⏳ กำลังดึงราคา...';ch.className='fhint';
      clearTimeout(_symFetchTimer);
      _symFetchTimer=setTimeout(()=>fetchSinglePrice(sym),700);
    }else{ch.textContent='';ch.className='fhint';}
  }
  calcTotal();
}

function setPriceMode(mode){
  _priceMode=mode;
  document.getElementById('pm-auto-sec').style.display=mode==='auto'?'':'none';
  document.getElementById('pm-manual-sec').style.display=mode==='manual'?'':'none';
  document.getElementById('pm-auto-btn').className=`btn btn-sm ${mode==='auto'?'btn-b':'btn-ghost'}`;
  document.getElementById('pm-manual-btn').className=`btn btn-sm ${mode==='manual'?'btn-b':'btn-ghost'}`;
}

function renderPriceHistory(){
  const list=document.getElementById('mi-ph-list');
  const hint=document.getElementById('mi-ph-hint');
  if(!_priceHistory.length){
    list.innerHTML='<div style="color:var(--muted);font-size:11px;padding:8px 0;text-align:center">ยังไม่มีข้อมูล — กด "+ เพิ่มเดือน"</div>';
    hint.textContent='💡 ราคาของเดือนล่าสุดจะใช้เป็นราคาปัจจุบัน';
    hint.className='fhint';
    return;
  }
  // เรียงโดยแนบ originalIndex ไว้ก่อน
  const withIdx=_priceHistory.map((r,i)=>({...r,_i:i})).sort((a,b)=>a.month.localeCompare(b.month));
  list.innerHTML=withIdx.map(row=>`
    <div style="display:flex;gap:6px;align-items:center;margin-bottom:7px">
      <input type="month" value="${row.month}"
        style="flex:1;padding:8px 10px;background:var(--bg3);border:1px solid var(--border2);
               border-radius:var(--rads);color:var(--text);font-size:13px;outline:none;font-family:'Outfit';-webkit-appearance:none"
        onchange="_priceHistory[${row._i}].month=this.value;renderPriceHistory()">
      <div style="position:relative;flex-shrink:0">
        <span style="position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted2);font-size:12px;pointer-events:none">$</span>
        <input type="number" value="${row.price||''}" placeholder="0.00" step="any"
          style="width:100px;padding:8px 10px 8px 20px;background:var(--bg3);border:1px solid var(--border2);
                 border-radius:var(--rads);color:var(--text);font-size:13px;outline:none;font-family:'JetBrains Mono'"
          onchange="_priceHistory[${row._i}].price=parseFloat(this.value)||0;renderPriceHistory()">
      </div>
      <button class="btn btn-ghost btico" onclick="_priceHistory.splice(${row._i},1);renderPriceHistory()">🗑️</button>
    </div>`).join('');
  const latest=withIdx[withIdx.length-1];
  hint.textContent=latest?.price>0
    ? `💡 ราคาล่าสุด (${latest.month}): $${latest.price} — ใช้เป็นราคาปัจจุบัน ✅`
    : '💡 ราคาของเดือนล่าสุดจะใช้เป็นราคาปัจจุบัน';
  hint.className=latest?.price>0?'fhint ok':'fhint';
}

function addPriceRow(){
  const now=new Date();
  // หาเดือนล่าสุดที่ยังไม่มีในลิสต์
  let target=null;
  for(let i=0;i<24;i++){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const m=d.toISOString().slice(0,7);
    if(!_priceHistory.find(r=>r.month===m)){target=m;break;}
  }
  if(target) _priceHistory.push({month:target,price:0});
  else _priceHistory.push({month:new Date().toISOString().slice(0,7),price:0});
  _priceHistory.sort((a,b)=>a.month.localeCompare(b.month));
  renderPriceHistory();
}

async function fetchSinglePrice(symOverride){
  const sym=(symOverride||document.getElementById('mi-sym').value).toUpperCase().trim();
  if(!sym){toast('กรุณากรอก Symbol ก่อน',false);return;}
  const ch=document.getElementById('mi-ch');
  const btn=document.getElementById('mi-fetch-btn');
  ch.textContent='⏳ กำลังดึงราคา...';ch.className='fhint';
  if(btn){btn.disabled=true;btn.textContent='⏳ กำลังดึง...';}
  try{
    const url=`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${sym}&fields=regularMarketPrice,regularMarketChangePercent`;
    const res=await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,{signal:AbortSignal.timeout(9000)});
    const json=await res.json();
    const q=json?.quoteResponse?.result?.[0];
    if(q?.regularMarketPrice){
      document.getElementById('mi-cur').value=q.regularMarketPrice;
      ch.textContent=`✅ ${fU(q.regularMarketPrice)} (${fP(q.regularMarketChangePercent||0)})`;
      ch.className='fhint ok';
      LIVE[sym]={price:q.regularMarketPrice,chg:q.regularMarketChangePercent||0};
    }else{
      ch.textContent='⚠️ ไม่พบราคา — กรอกเองได้เลย';ch.className='fhint';
    }
  }catch(e){
    ch.textContent='⚠️ ดึงไม่ได้ — กรอกเองได้เลย';ch.className='fhint';
  }finally{
    if(btn){btn.disabled=false;btn.textContent='📡 ดึงราคา';}
  }
}
function calcTotal(){
  const qty=parseFloat(document.getElementById('mi-qty').value)||0;
  const buy=parseFloat(document.getElementById('mi-buy').value)||0;
  if(qty&&buy){
    const baht=qty*buy*DB.usdthb;
    document.getElementById('mi-total').value=fN(baht,2).replace(/,/g,'');
    document.getElementById('mi-th').textContent=`${fN(qty)} × ${fU(buy)} × ${fN(DB.usdthb,2)} = ${fB(baht)}`;
  }
}

/* ══ DELETE ══════════════════════════════════════════════════════════ */
function doDelete(sec,id){
  document.getElementById('del-ok').onclick=()=>{
    DB[sec]=DB[sec].filter(x=>x.id!==id);
    saveDB();cm('m-del');toast('ลบแล้ว');
    const cur=document.querySelector('.nb.active')?.dataset.p;
    if(renders[cur]) renders[cur]();
    rDash();
  };
  document.getElementById('m-del').classList.add('open');
}
